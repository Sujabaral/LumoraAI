<!DOCTYPE html>
<html>
  <body>
    {% if already_verified %}
      <h2>Hello {{ user.username }},</h2>
      <p>Your email was already verified. You can now <a href="{{ url_for('users.login') }}">login</a>.</p>
    {% else %}
      <h2>Welcome {{ user.username }}!</h2>
      <p>Your email has been successfully verified. You can now <a href="{{ url_for('users.login') }}">login</a>.</p>
    {% endif %}
  </body>
</html>
